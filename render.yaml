services:
  # ── Backend Orchestrator ──────────────────────────────────────
  - type: web
    name: saferoutes-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ML_ENGINE_URL
        value: https://saferoutes-ml.onrender.com
      - key: FRONTEND_URL
        value: https://saferoutes-ai.vercel.app
    healthCheckPath: /api/health

  # ── ML Engine (FastAPI) ───────────────────────────────────────
  - type: web
    name: saferoutes-ml
    runtime: python
    plan: free
    rootDir: ml-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ml_engine:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health
